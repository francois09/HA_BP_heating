blueprint:
  name: Room heating mode switching
  description: React to manual or automatic setup on thermostatic valve
  domain: automation
  source_url: https://github.com/francois09/HA_blueprints/heater_switch_mode.yaml
  input:
    climate_valve:
      name: Climate valve
      description: Rooms TRV (viewed as Climate)
      selector:
        entity:
          domain: climate
    manual_boolean:
      name: Manual mode switch
      description: Switch indicating if the room is in manual or automated mode
      selector:
        entity:
          domain: input_boolean
    selected_temp:
      name: Selected °C setpoint
      description: Helper to store room setpoint calculated by Heating Management
      selector:
        entity:
          domain: input_number
    winter_mode_boolean:
      name: Winter switch
      description: Global switch to say it's winter or not.
      selector:
        entity:
          domain: input_boolean
    selector_timer:
      name: Timer to trigger read the temp event
      description: Room timer to avoid multiple T° messages from TRV.
      selector:
        entity:
          domain: timer
    override_timer:
      name: Timer to trigger reset to automated management
      description: Timer to wait before resetting to automated T°
      selector:
        entity:
          domain: timer
    debounce_boolean:
      name: Debounce valve update
      description: Room debounce boolean flag
      selector:
        entity:
          domain: input_boolean
    occupancy_boolean:
      name: Occupancy mode
      description: Indicating if the room is occupied or no
      selector:
        entity:
          domain: input_boolean
    active_boolean:
      name: Active for automation
      description: Room activation status
      selector:
        entity:
          domain: input_boolean

mode: queued
max_exceeded: silent

variables:
  local_climate_valve: !input climate_valve

trigger:
- platform: state
  entity_id: !input selector_timer
  to: idle
  id: TriggeredByTimer
- platform: state
  entity_id: !input climate_valve
  attribute: preset_mode
- platform: state
  entity_id: !input climate_valve
  attribute: temperature
- platform: state
  entity_id: !input override_timer
  to: idle
  id: TriggeredByOverrideReset

condition:
  - condition: state
    entity_id: !input winter_mode_boolean
    state: 'on'


action:
- choose:

  #### When any change, wait timer to collect selected T°
  - conditions:
    - condition: not
      conditions:
        - condition: trigger
          id:
            - TriggeredByTimer
    sequence:
      - service: timer.start
        data:
          duration: '0:00:05'
        target:
          entity_id: !input selector_timer

  # When debounce is on, just turn off (automated events)
  - conditions:
    - condition: trigger
      id:
        - TriggeredByTimer
    - condition: state
      entity_id: !input debounce_boolean
      state: 'on'
    sequence:
    - service: input_boolean.turn_off
      data: {}
      target:
        entity_id: !input debounce_boolean

  #### When override timer is Ok, it's time to reset to automated management
  - conditions:
    - condition: trigger
      id:
        - TriggeredByOverrideReset
    - condition: state
      entity_id: !input active_boolean
      state: 'on'
    ### - condition: #### Value above normal value
    sequence:
    - service: input_boolean.turn_off
      data: {}
      target:
        entity_id: !input manual_boolean
    - service: climate.set_preset_mode
      data:
        preset_mode: auto
      target:
        entity_id: !input climate_valve
    # - service: input_number.set_value
    #   data_template:
    #     value: "{% set temp = state_attr(local_climate_valve,'temperature')|float %}{{ temp }}"
    #     entity_id: !input selected_temp

  #### When timer is Ok, it's time to collect selected T° and turn flag to manual
  - conditions:
    - condition: trigger
      id:
        - TriggeredByTimer
    - condition: state
      entity_id: !input climate_valve
      attribute: preset_mode
      state: manual
    sequence:
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: !input manual_boolean
    - service: input_number.set_value
      data_template:
        value: "{% set temp = state_attr(local_climate_valve,'temperature')|float %}{{ temp }}"
        entity_id: !input selected_temp
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: !input occupancy_boolean
    - service: timer.start
      data:
        duration: '6:00:00'
      target:
        entity_id: !input override_timer

  #### When auto mode selected, set debounce and re-send manual to valve
  - conditions:
    - condition: trigger
      id:
        - TriggeredByTimer
    - condition: state
      entity_id: !input climate_valve
      attribute: preset_mode
      state: auto
    sequence:
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: !input debounce_boolean
    - service: climate.set_preset_mode
      data:
        preset_mode: manual
      target:
        entity_id: !input climate_valve
    - service: input_boolean.turn_off
      data: {}
      target:
        entity_id: !input manual_boolean
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: !input occupancy_boolean
    - service: timer.cancel
      data: {}
      target:
        entity_id: !input override_timer

  #### When holiday mode selected, set debounce and re-send manual to valve
  - conditions:
    - condition: trigger
      id:
        - TriggeredByTimer
    - condition: state
      entity_id: !input climate_valve
      attribute: preset_mode
      state: holiday
    sequence:
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: !input debounce_boolean
    - service: climate.set_preset_mode
      data:
        preset_mode: manual
      target:
        entity_id: !input climate_valve
    - service: input_boolean.turn_off
      data: {}
      target:
        entity_id: !input occupancy_boolean
    - service: timer.cancel
      data: {}
      target:
        entity_id: !input override_timer
